<div id="status-overview">
    <h4>{{ _( "Status" ) }}</h4>
    <table class="table table-bordered table-striped">
        <thead>
            <tr>
                <th width="25%">{{ _( "Property" ) }}</th>
                <th>{{ _( "Value" ) }}</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>{{ _( "System Proxy" ) }}</td>
                <td id="system-proxy"></td>
            </tr>
            <tr>
                <td>{{ _( "Launcher Web UI" ) }}</td>
                <td>@127.0.0.1:8085</td>
            </tr>
            <tr>
                <td>{{ _( "X-Tunnel" ) }}</td>
                <td id="xtunnel-status"></td>
            </tr>
        </tbody>
    </table>

    <h4>{{ _( "System Info" ) }}</h4>
    <table class="table table-bordered table-striped">
        <thead>
            <tr>
                <th width="25%">{{ _( "Property" ) }}</th>
                <th>{{ _( "Value" ) }}</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>{{ _( "APP_NAME" ) }} Version</td>
                <td id="xxnet-version"></td>
            </tr>
            <tr>
                <td>{{ _( "Language" ) }}</td>
                <td id="language"></td>
            </tr>
        </tbody>
    </table>
</div>

<script type="text/javascript">
    title('{{ _( "APP_NAME" ) }} {{ _( "Status Info" ) }}');

    function updateProperty(selector, content) {
        var previousContent = $(selector).html();
        if (String(previousContent) !== String(content)) {
            $(selector).html(content);
        }
    }

    function updateStatusPage() {
        $.ajax({
            type: 'GET',
            url: '/config',
            data: { cmd: 'get_config' },
            dataType: 'JSON',
            success: function (result) {
                switch (result['system-proxy']) {
                    case 'x_tunnel':
                        updateProperty('#system-proxy', '{{ _( "Global X-Tunnel Proxy set" ) }}');
                        break;
                    case 'disable':
                        updateProperty('#system-proxy', '{{ _( "Global Proxy disabled" ) }}');
                        break;
                    default:
                        updateProperty('#system-proxy', result['system-proxy']);
                        break;
                }

                updateProperty('#language', result['language']);
                updateProperty('#xtunnel-status', result['x_tunnel_enable'] ? '@127.0.0.1:1080' : '{{ _( "disable" ) }}');
            },
            error: function () {
                displayErrorMessage();
            }
        });

        $.ajax({
            type: 'GET',
            url: '/config',
            data: { cmd: 'get_version' },
            dataType: 'JSON',
            success: function (result) {
                updateProperty('#xxnet-version', result['current_version']);
            }
        });
    }

    documentReadyToRun.push(function () {
        updateStatusPage();
    });
</script>
